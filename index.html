<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我 的私人存储空间</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        #file-list { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
        a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📂 我的私人仓库</h1>
        <ul id="file-list">加载中...</ul>
    </div>

    <script>
        // 自动获取 GitHub 仓库内容 (请把 username/repo 改为你自己的)
        const repo = "fangmaodi/new-web"; 
        fetch(`https://api.github.com/repos/${repo}/contents/`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('file-list');
                list.innerHTML = '';
                data.forEach(file => {
                    if(file.name !== 'index.html' && file.name !== '.nojekyll') {
                        let li = document.createElement('li');
                        li.innerHTML = `📄 <a href="${file.path}">${file.name}</a>`;
                        list.appendChild(li);
                    }
                });
            });
    </script>
</body>
</html>
